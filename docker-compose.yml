version: '3.8'

services:

  # ── PHP Laravel App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainguard_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - chainguard_network
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  # ── Nginx Web Server ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chainguard_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/chainguard.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chainguard_network
    depends_on:
      - app

  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: chainguard_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: chainguard
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: chainguard
    ports:
      - "3307:3306"
    volumes:
      - chainguard_db_data:/var/lib/mysql
    networks:
      - chainguard_network

  # ── Queue Worker (untuk jobs) ──────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainguard_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - .:/var/www
    networks:
      - chainguard_network
    depends_on:
      - db
      - app

  # ── Scheduler (cron untuk real-time data) ─────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainguard_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - chainguard_network
    depends_on:
      - db
      - app

networks:
  chainguard_network:
    driver: bridge

volumes:
  chainguard_db_data:
    driver: local
